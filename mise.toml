# Overture — root task surface. Run everything from the repo root (no cd):
#   mise run dev | typecheck | wasm | dsp | smoke | build | setup
#
# The orchestration is polyglot: the web emulator is TS/Vite (pnpm), while the
# `tool` submodule builds via Docker (aarch64 gcc for dsp.so, emscripten for wasm)
# and Python. Tasks here are thin wrappers; the forks keep their own scripts so
# they stay close to upstream (no node/workspace wiring leaks into the submodules).

[tools]
node = "lts"

# Per-developer overrides live in a gitignored .env (e.g. MOVE_HOST=move-em.local).
# The tool's install.sh falls back to move.local when MOVE_HOST is unset, so other
# devs need no .env. See .env.example.
[env]
_.file = ".env"

[tasks.setup]
description = "Install web emulator dependencies"
run = "pnpm -C web install"

[tasks.dev]
description = "Serve the Overture emulator (real tool UI + mock host)"
run = "pnpm -C web dev"

[tasks.typecheck]
description = "Type-check the web harness"
run = "pnpm -C web typecheck"

[tasks.web-build]
description = "Production build of the web emulator"
run = "pnpm -C web build"

[tasks.itest]
description = "Headless integration tests — real ui.js + seq8-wasm in Node (vitest)"
run = "pnpm -C web test:node"

[tasks.screenshot]
description = "Render the emulator headless (Playwright) → web/shot.png + shot-oled.png"
run = "pnpm -C web exec playwright test"

[tasks.test]
description = "All web tests: integration (vitest) + visual/E2E (playwright)"
depends = ["itest", "screenshot"]

[tasks.dsp]
description = "Cross-compile the tool's device dsp.so (aarch64, GLIBC<=2.35) via Docker"
run = "tool/scripts/build.sh"

[tasks.wasm]
description = "Build the tool's seq8 -> wasm target via emscripten Docker"
run = "tool/scripts/build-wasm.sh"

[tasks.smoke]
description = "Run the seq8 wasm round-trip smoke test"
run = "node tool/scripts/seq8-wasm-smoke.mjs"

[tasks.build]
description = "Build everything: device dsp.so + wasm + web"
depends = ["dsp", "wasm", "web-build"]

[tasks.install]
description = "Deploy the full stack to the Move (delegates to ./install.sh)"
run = "./install.sh"

[tasks.deploy]
description = "Build + deploy the Overture tool module via Schwung's install-module path ($MOVE_HOST)"
depends = ["dsp"]
run = '''
set -euo pipefail
SCHWUNG_INSTALL="${SCHWUNG_INSTALL_SCRIPT:-../schwung/scripts/install.sh}"
TARBALL="tool/dist/overture-module.tar.gz"
[ -f "$SCHWUNG_INSTALL" ] || { echo "Missing Schwung installer: $SCHWUNG_INSTALL"; exit 1; }
[ -f "$TARBALL" ] || { echo "Missing module tarball: $TARBALL"; exit 1; }
bash "$SCHWUNG_INSTALL" install-module "$TARBALL"
'''

# --- co-run Schwung-host bridge (temporary, until upstream PR #94 lands) -------
# Overlays joshgaine's co-run onto the device's stock Schwung via a targeted
# 3-file swap. Source of truth = the `corun` branch on m-dwyer/schwung (our
# private snapshot; upstream=charlesvestal stays wired for when PR #94 lands).
# $SCHWUNG_FORK_DIR is just the build workspace (default below). corun-on-v0917.
[tasks.corun-build]
description = "Build the co-run Schwung bridge (Docker aarch64); clones m-dwyer/schwung@corun if absent"
run = '''
set -e
DIR="${SCHWUNG_FORK_DIR:-$HOME/src/move-spike/legsmechanical-schwung}"
if [ ! -d "$DIR/.git" ]; then
  echo "Cloning m-dwyer/schwung (corun) -> $DIR"
  git clone -b corun git@github.com:m-dwyer/schwung.git "$DIR"
fi
cd "$DIR"
git fetch origin corun --tags --quiet
git checkout --quiet corun
./scripts/build.sh
'''

[tasks.corun-deploy]
description = "Deploy the co-run Schwung bridge to $MOVE_HOST (targeted 3-file swap; version-guarded)"
run = "bash scripts/deploy-corun-schwung.sh"

[tasks.corun-revert]
description = "Restore stock Schwung from the *.pre-corun backups on $MOVE_HOST"
run = "bash scripts/revert-corun-schwung.sh"
