# Overture — root task surface. Run everything from the repo root (no cd):
#   mise run dev | site-dev | verify | test | tool-build | moveforge-wasm | build | setup
#
# The orchestration is polyglot: the web emulator is TS/Vite (pnpm), and the
# active Overture tool package lives under overture-next/. Tasks here are thin
# wrappers around those local scripts.

[tools]
node = "lts"

# Per-developer overrides live in a gitignored .env (e.g. MOVE_HOST=move-em.local).
# The tool's install.sh falls back to move.local when MOVE_HOST is unset, so other
# devs need no .env. See .env.example.
[env]
_.file = ".env"

[tasks.setup]
description = "Install workspace deps"
run = """
pnpm install
"""

[tasks.dev]
description = "Serve the Overture emulator (real tool UI + mock host)"
depends = ["moveforge-wasm"]
run = "pnpm -C web dev"

[tasks.site-dev]
description = "Serve the public Astro site"
depends = ["emulator-dist"]
run = "pnpm -C site dev"

[tasks.site-build]
description = "Production build of the public Astro site"
depends = ["emulator-dist"]
run = "pnpm -C site build"

[tasks.typecheck]
description = "Type-check the active Overture tool package and web harness"
run = "pnpm typecheck"

[tasks.verify]
description = "Current Overture ratchet: active tool package checks + web focused tests"
run = "pnpm verify"

[tasks.web-build]
description = "Production build of the web emulator"
depends = ["moveforge-wasm"]
run = "pnpm -C web build"

[tasks.tool-build]
description = "Build the active Overture Schwung tool package"
run = "pnpm -C overture-next build"

[tasks.moveforge-init]
description = "Initialize the pinned Moveforge submodule"
run = "git submodule update --init --recursive moveforge"

[tasks.moveforge-update]
description = "Advance the Moveforge submodule to the latest main commit"
run = "git submodule update --remote --merge moveforge"

[tasks.moveforge-wasm]
description = "Build Moveforge browser WASM modules for the emulator"
depends = ["moveforge-init"]
run = "cd moveforge && mise run wasm"

[tasks.emulator-dist]
description = "Prepare the static web emulator bundle served by the Astro site at /emulator/"
depends = ["moveforge-wasm"]
sources = [
  "web/index.html",
  "web/package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "web/postcss.config.js",
  "web/tailwind.config.ts",
  "web/tsconfig.json",
  "web/vite.config.ts",
  "web/public/**/*",
  "web/src/**/*",
  "overture-next/src/**/*",
  "overture-next/ui/**/*",
  "moveforge/src/modules/**/*",
  "moveforge/web/wasm/*.wasm",
]
outputs = ["web/dist/index.html"]
run = "pnpm -C web build"

[tasks.cover]
description = "Code-coverage (vitest v8) for the web harness"
run = "pnpm -C web test:coverage"

[tasks.gap-map]
description = "Regenerate the coverage gap-map table from both vitest reports (run `cover` first)"
run = "python3 scripts/coverage_gapmap.py"

[tasks.screenshot]
description = "Current emulator Playwright smoke/input tests"
run = "pnpm -C web test:e2e"

[tasks.reference-screenshot]
description = "Reference Playwright suite from the dAVEBOx-fork era; port scenarios into current tests deliberately"
run = "pnpm -C web test:e2e:reference"

[tasks.screenshot-report]
description = "Open the last Playwright HTML report — side-by-side expected/actual/diff slider for visual-snapshot failures"
run = "pnpm -C web exec playwright show-report"

[tasks.screenshot-update]
description = "Re-baseline OLED goldens (--update-snapshots). Use after a deliberate render change; eyeball the report first to confirm content is unchanged."
run = "pnpm -C web exec playwright test --update-snapshots"

[tasks.manual-assert]
description = "Guard: drive every documented manual figure and assert its caption still holds (no regen)"
run = "pnpm -C web manual:assert"

[tasks.manual-check]
description = "Regenerate both manuals and fail if the committed markdown is stale"
run = "pnpm -C web manual:check"

[tasks.test]
description = "Current Overture tests: replacement ratchet + emulator E2E"
depends = ["verify", "screenshot"]

[tasks.restart]
description = "Restart Move + Schwung stack on $MOVE_HOST"
run = '''
set -euo pipefail
HOST="${MOVE_HOST:-move.local}"
USER="${MOVE_USER:-ableton}"
ssh "$USER@$HOST" 'sh /data/UserData/schwung/restart-move.sh'
'''

[tasks.build]
description = "Build active tool package + web emulator"
depends = ["tool-build", "web-build"]

[tasks.install]
description = "Deploy the full stack to the Move (delegates to ./install.sh)"
run = "./install.sh"

[tasks.deploy]
description = "Build + deploy the active Overture tool package via Schwung install-module ($MOVE_HOST)"
run = "pnpm -C overture-next deploy"

[tasks.schwung-build]
description = "Build pinned upstream Schwung (Docker aarch64)"
run = "bash schwung/scripts/build.sh"

[tasks.schwung-check-corun]
description = "Check the installed Move host exposes upstream Schwung co-run APIs"
run = '''
set -euo pipefail
HOST="${MOVE_HOST:-move.local}"
SD="/data/UserData/schwung"
ABLE="ableton@${HOST}"
MIN_VER="0.9.18"

version_ge() {
  awk -v a="$1" -v b="$2" 'BEGIN {
    split(a, A, "."); split(b, B, ".");
    for (i = 1; i <= 3; i++) {
      ai = A[i] + 0; bi = B[i] + 0;
      if (ai > bi) exit 0;
      if (ai < bi) exit 1;
    }
    exit 0;
  }'
}

VER="$(ssh -o ConnectTimeout=8 "$ABLE" "cat $SD/host/version.txt" 2>/dev/null | tr -d '[:space:]')"
[ -n "$VER" ] || { echo "ERROR: could not read installed Schwung version from $HOST"; exit 1; }
version_ge "$VER" "$MIN_VER" || { echo "ERROR: installed Schwung v$VER is older than required v$MIN_VER"; exit 1; }

for sym in shadow_corun_begin shadow_corun_end shadow_corun_state; do
  if ! ssh -o ConnectTimeout=8 "$ABLE" "strings $SD/shadow/shadow_ui | grep -q $sym" 2>/dev/null; then
    echo "ERROR: installed shadow_ui lacks $sym"
    exit 1
  fi
done

echo "Installed Schwung v$VER exposes upstream co-run APIs on $HOST."
'''

[tasks.schwung-install]
description = "Install pinned upstream Schwung to $MOVE_HOST only when schwung-check-corun fails"
depends = ["schwung-build"]
run = '''
set -euo pipefail
HOST="${MOVE_HOST:-move.local}"
bash schwung/scripts/install.sh local --skip-confirmation "--host=$HOST"
'''
