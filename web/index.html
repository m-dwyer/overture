<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overture Emulator</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #111; color: #ccc; font: 13px/1.4 ui-monospace, monospace; }
      #app { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px; }
      h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; color: #888; margin: 0; }
      #oled { image-rendering: pixelated; background: #001b14; border: 2px solid #333; border-radius: 4px; }
      #status { white-space: pre; color: #6a6; min-height: 1.4em; }
      #log { width: 560px; height: 140px; overflow: auto; background: #0a0a0a; border: 1px solid #222;
             padding: 6px 8px; font-size: 11px; color: #777; }

      /* Move hardware shell */
      #shell { display: flex; flex-direction: column; gap: 8px; align-items: center; }
      #shell .row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
      #shell button { font: 11px ui-monospace, monospace; color: #bbb; background: #1c1c1f;
        border: 1px solid #3a3a40; border-radius: 4px; padding: 6px 8px; cursor: pointer; user-select: none; }
      #shell button:hover { border-color: #555; }
      #shell button.on { background: #19f0a8; color: #022; border-color: #19f0a8; }
      #shell .step { width: 30px; padding: 8px 0; }
      #shell .track { background: #233; }
      #shell .enc { display: flex; flex-direction: column; align-items: center; gap: 2px; }
      #shell .enc-label { font: 10px ui-monospace, monospace; color: #777; }
      #shell .enc-row { display: flex; gap: 2px; }
      #shell .enc-btn { width: 26px; padding: 4px 0; }
      #shell .pads { display: grid; grid-template-columns: repeat(8, 40px); gap: 5px; margin-top: 4px; }
      #shell .pad { height: 40px; background: #181820; border: 1px solid #333; color: #555; }
      #shell .pad.on { background: #19f0a8; color: #022; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>OVERTURE — EMULATOR (layout tier)</h1>
      <canvas id="oled" width="128" height="64" style="width: 512px; height: 256px;"></canvas>
      <div id="status">booting…</div>
      <div id="shell"></div>
      <div id="log"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
