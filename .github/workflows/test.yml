name: Fast Test

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.2"

concurrency:
  group: fast-test-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Detect Fast Test relevance
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          if [ -z "$BASE" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED="$(git diff --name-only "$BASE" "$GITHUB_SHA")"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -Eq '^(\.github/workflows/test\.yml$|web/|overture-next/|mise\.toml$|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm
        if: steps.changes.outputs.run == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml

      - name: Install workspace dependencies
        if: steps.changes.outputs.run == 'true'
        run: pnpm --filter @overture/tool --filter overture-web install --frozen-lockfile

      - name: Verify Overture Next
        if: steps.changes.outputs.run == 'true'
        run: pnpm verify

      - name: Skip Fast Test
        if: steps.changes.outputs.run != 'true'
        run: echo "No active Overture Next/web CI inputs changed; skipping Fast Test."
