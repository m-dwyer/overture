name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "web/**"
      - "overture-next/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "prettier.config.mjs"
      - ".prettierignore"
      - "mise.toml"
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "web/**"
      - "overture-next/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "prettier.config.mjs"
      - ".prettierignore"
      - "mise.toml"
  workflow_dispatch:
    inputs:
      deploy_to_pages:
        description: "Deploy this run to the live GitHub Pages site"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.2"
  EMSCRIPTEN_IMAGE: "emscripten/emsdk:3.1.74"
  MOVEFORGE_REF: "fe81dc5facb6d642c77d7cfed4a15d175b77da49"

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout Moveforge
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/moveforge
          ref: ${{ env.MOVEFORGE_REF }}
          path: moveforge

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            moveforge/pnpm-lock.yaml

      - name: Restore Moveforge WASM cache
        id: moveforge-wasm-cache
        uses: actions/cache@v4
        with:
          path: moveforge/web/wasm
          key: moveforge-wasm-${{ runner.os }}-${{ env.EMSCRIPTEN_IMAGE }}-${{ env.MOVEFORGE_REF }}-${{ hashFiles('moveforge/package.json', 'moveforge/pnpm-lock.yaml', 'moveforge/scripts/build-wasm.sh', 'moveforge/scripts/module-target.ts', 'moveforge/scripts/lib/**', 'moveforge/src/host/**', 'moveforge/src/modules/**') }}

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Moveforge dependencies
        if: steps.moveforge-wasm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
        working-directory: moveforge

      - name: Build Moveforge WASM modules
        if: steps.moveforge-wasm-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-wasm.sh
        working-directory: moveforge
        env:
          EMSCRIPTEN_IMAGE: ${{ env.EMSCRIPTEN_IMAGE }}

      - name: Verify Moveforge WASM assets
        run: |
          test -d web/wasm
          wasm_count="$(find web/wasm -maxdepth 1 -type f -name '*.wasm' | wc -l)"
          test "$wasm_count" -gt 0
        working-directory: moveforge

      - name: Build emulator
        run: pnpm -C web build
        env:
          MOVEFORGE_ROOT: ${{ github.workspace }}/moveforge

      - name: Build site
        run: pnpm -C site build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
          GITHUB_PAGES: "true"

      - name: Upload artifact
        if: |
          github.event_name == 'push' && github.ref == 'refs/heads/main' ||
          github.event_name == 'workflow_dispatch' && inputs.deploy_to_pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && inputs.deploy_to_pages
    concurrency:
      group: pages-live
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
