name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "web/**"
      - "overture-ui/**"
      - "mise.toml"
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "web/**"
      - "overture-ui/**"
      - "mise.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout Moveforge
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/moveforge
          path: moveforge

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            site/pnpm-lock.yaml
            web/pnpm-lock.yaml
            overture-ui/pnpm-lock.yaml
            moveforge/pnpm-lock.yaml

      - name: Install site dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Install Moveforge dependencies
        run: pnpm install --frozen-lockfile
        working-directory: moveforge

      - name: Build Moveforge WASM modules
        run: ./scripts/build-wasm.sh
        working-directory: moveforge

      - name: Build Overture seq8 WASM
        run: ./scripts/build-wasm.sh
        working-directory: overture-ui

      - name: Build emulator
        run: pnpm build
        working-directory: web
        env:
          MOVEFORGE_ROOT: ${{ github.workspace }}/moveforge

      - name: Build site
        run: pnpm build
        working-directory: site
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
          GITHUB_PAGES: "true"

      - name: Upload artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
